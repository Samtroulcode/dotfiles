session_name: board
windows:
  - window_name: board
    start_directory: /home/sam
    focus: "true"
    layout: ad3d,250x60,0,0{125x60,0,0,1,124x60,126,0,2}
    options:
      automatic-rename: false
    panes:
      - sleep_before: 0.5
        shell_command:
          - btop --preset 2
      - sleep_before: 0.5
        shell_command:
          - btop --preset 1
