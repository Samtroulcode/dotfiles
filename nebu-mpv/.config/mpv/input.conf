# ======================================================================
# mpv + uosc
# Base cohérente, sans conflits de touches
# - lecture : style vim
# - menus uosc : Alt+hjkl / Ctrl+u,d / Home,End
# ======================================================================

# ----------------------------------------------------------------------
# Souris / trackpad
# ----------------------------------------------------------------------
MOUSE_BTN0      ignore
MOUSE_BTN0_DBL  cycle fullscreen
MOUSE_BTN2      cycle pause; script-binding uosc/flash-pause-indicator

AXIS_UP         ignore
AXIS_DOWN       ignore
AXIS_LEFT       ignore
AXIS_RIGHT      ignore

WHEEL_UP        no-osd add volume 5;  script-binding uosc/flash-volume
WHEEL_DOWN      no-osd add volume -5; script-binding uosc/flash-volume

SHIFT+WHEEL_UP    seek  30 relative+keyframes; script-binding uosc/flash-timeline
SHIFT+WHEEL_DOWN  seek -30 relative+keyframes; script-binding uosc/flash-timeline

CTRL+WHEEL_UP     frame-step; script-binding uosc/decide-pause-indicator
CTRL+WHEEL_DOWN   frame-back-step; script-binding uosc/decide-pause-indicator

# ----------------------------------------------------------------------
# Lecture / navigation vidéo (vimesque)
# ----------------------------------------------------------------------
h               seek -5  relative+keyframes
l               seek  5  relative+keyframes
H               seek -30 relative+keyframes; script-binding uosc/flash-timeline
L               seek  30 relative+keyframes; script-binding uosc/flash-timeline

CTRL+h          seek -1 relative+exact
CTRL+l          seek  1 relative+exact

j               add chapter -1; script-message-to uosc flash-elements top_bar,timeline
k               add chapter  1; script-message-to uosc flash-elements top_bar,timeline

J               script-binding uosc/prev; script-message-to uosc flash-elements top_bar,timeline
K               script-binding uosc/next; script-message-to uosc flash-elements top_bar,timeline

g               seek 0   absolute-percent
G               seek 100 absolute-percent

PGUP            seek  600 relative+keyframes; script-binding uosc/flash-timeline
PGDWN           seek -600 relative+keyframes; script-binding uosc/flash-timeline

# ----------------------------------------------------------------------
# Lecture / état
# ----------------------------------------------------------------------
SPACE           cycle pause; script-binding uosc/flash-pause-indicator
ENTER           show-progress
f               cycle fullscreen
ESC             set fullscreen no

q               quit
Q               quit-watch-later

m               no-osd cycle mute; script-binding uosc/flash-volume

UP              no-osd add volume  5; script-binding uosc/flash-volume
DOWN            no-osd add volume -5; script-binding uosc/flash-volume

[               no-osd add speed -0.25; script-binding uosc/flash-speed
]               no-osd add speed  0.25; script-binding uosc/flash-speed
\               no-osd set speed 1;     script-binding uosc/flash-speed

BS              revert-seek
SHIFT+BS        set speed 1; set audio-delay 0; set sub-delay 0; show-text "Reset playback tweaks"

# ----------------------------------------------------------------------
# Frame stepping / screenshot
# ----------------------------------------------------------------------
.               frame-step;      script-binding uosc/decide-pause-indicator
,               frame-back-step; script-binding uosc/decide-pause-indicator

y               screenshot
Y               screenshot video
CTRL+y          screenshot window

# ----------------------------------------------------------------------
# Sous-titres / audio / vidéo
# ----------------------------------------------------------------------
a               script-binding uosc/audio           #! Tracks > Audio
s               script-binding uosc/subtitles       #! Tracks > Subtitles
v               script-binding uosc/video           #! Tracks > Video
e               script-binding uosc/editions        #! Tracks > Editions

z               add sub-delay -0.1; show-text "Sub delay: ${sub-delay}"
x               add sub-delay  0.1; show-text "Sub delay: ${sub-delay}"
c               set sub-delay 0;     show-text "Sub delay reset"

n               add audio-delay -0.1; show-text "Audio delay: ${audio-delay}"
N               add audio-delay  0.1; show-text "Audio delay: ${audio-delay}"
C               set audio-delay 0;     show-text "Audio delay reset"

r               add sub-scale -0.05; show-text "Subtitle scale: ${sub-scale}"
R               add sub-scale  0.05; show-text "Subtitle scale: ${sub-scale}"

# ----------------------------------------------------------------------
# Menus uosc
# ----------------------------------------------------------------------
TAB             script-binding uosc/menu            #! Menu principal
t               script-binding uosc/toggle-ui       #! UI > Toggle UI
T               script-binding uosc/toggle-progress #! UI > Toggle progress

p               script-binding uosc/playlist        #! Browsing > Playlist
o               script-binding uosc/open-file       #! Browsing > Open file
O               script-binding uosc/items           #! Browsing > Items
b               script-binding uosc/chapters        #! Browsing > Chapters
?               script-binding uosc/keybinds        #! Help > Keybinds
u               script-binding uosc/audio-device    #! Audio > Output device

# ----------------------------------------------------------------------
# Navigation des menus uosc (vimesque sans conflit)
# ----------------------------------------------------------------------
ALT+h           script-binding uosc/menu-back
ALT+j           script-binding uosc/menu-next
ALT+k           script-binding uosc/menu-prev
ALT+l           script-binding uosc/menu-activate

CTRL+u          script-binding uosc/menu-prev-page
CTRL+d          script-binding uosc/menu-next-page
HOME            script-binding uosc/menu-start
END             script-binding uosc/menu-end

# ----------------------------------------------------------------------
# Console / infos
# ----------------------------------------------------------------------
:               script-binding console/enable       #! Help > Console
i               script-binding stats/display-stats
I               script-binding stats/display-stats-toggle

# ----------------------------------------------------------------------
# Divers utiles
# ----------------------------------------------------------------------
P               script-binding uosc/paste           #! Clipboard > Paste
CTRL+P          script-binding uosc/paste-to-playlist #! Clipboard > Paste to playlist
w               script-binding uosc/show-in-directory #! File > Show in directory
